name: tests
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install deps
        run: |
          pip install requests
          # stdlib tomllib arrived in 3.11; older Pythons use the tomli fallback
          python -c 'import sys; sys.exit(0 if sys.version_info >= (3,11) else 1)' || pip install tomli
      - name: Run unit tests
        run: python -m unittest test_historian -v
